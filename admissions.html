<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admissions • CRM</title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Axios -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Lucide -->

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->

        <aside class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <i data-lucide="building-2" class="text-blue-400"></i>
                <span class="font-semibold text-lg">CRM</span>
            </div>

            ```
            <nav class="flex-1 py-4 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="enquiries.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800">
                    <i data-lucide="message-square"></i> Enquiries
                </a>
                <a href="admissions.html" class="flex items-center gap-3 px-6 py-3 bg-blue-600">
                    <i data-lucide="graduation-cap"></i> Admissions
                </a>
                <a href="payments.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800">
                    <i data-lucide="wallet"></i> Payments
                </a>
                <a href="reports.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800"
                    id="reportsMenu">
                    <i data-lucide="bar-chart-3"></i> Reports
                </a>
            </nav>

            <div class="p-4 border-t border-gray-800 text-sm">
                <div id="userName"></div>
                <div id="userRole" class="text-gray-400 text-xs"></div>
            </div>
            ```

        </aside>

        <!-- Main -->

        <div class="flex-1 flex flex-col">

            ```
            <!-- Header -->
            <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
                <h1 class="text-xl font-semibold">Admissions</h1>
                <button id="logoutBtn">
                    <i data-lucide="log-out"></i>
                </button>
            </header>

            <!-- Content -->
            <main class="p-6 space-y-6 overflow-y-auto">

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Admissions</p>
                            <p id="totalAdmissions" class="text-2xl font-bold">0</p>
                        </div>
                        <i data-lucide="graduation-cap"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Revenue</p>
                            <p id="totalRevenue" class="text-2xl font-bold text-green-600">₹0</p>
                        </div>
                        <i data-lucide="wallet"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Pending</p>
                            <p id="totalPending" class="text-2xl font-bold text-red-600">₹0</p>
                        </div>
                        <i data-lucide="alert-circle"></i>
                    </div>

                </div>

                <!-- Filters -->
                <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap gap-4">

                    <input id="searchInput" placeholder="Search student..." class="px-4 py-2 border rounded-lg w-60">

                    <select id="courseFilter" class="px-4 py-2 border rounded-lg">
                        <option value="">All Courses</option>
                    </select>

                    <button id="resetFilters" class="text-gray-600">Reset</button>

                </div>

                <!-- Alerts -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div class="bg-white p-5 rounded-xl shadow-sm">
                        <h3 class="font-semibold mb-3 text-yellow-600 flex items-center gap-2">
                            <i data-lucide="clock"></i> Upcoming
                        </h3>
                        <div id="upcomingInstallments">No data</div>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm">
                        <h3 class="font-semibold mb-3 text-red-600 flex items-center gap-2">
                            <i data-lucide="alert-circle"></i> Overdue
                        </h3>
                        <div id="overdueInstallments">No data</div>
                    </div>

                </div>

                <!-- Table -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">

                    <table class="w-full">

                        <thead class="bg-gray-50 text-sm text-gray-500">
                            <tr>
                                <th class="px-6 py-3 text-left">Student</th>
                                <th class="px-6 py-3 text-left">Course</th>
                                <th class="px-6 py-3 text-left">Fees</th>
                                <th class="px-6 py-3 text-left">Paid</th>
                                <th class="px-6 py-3 text-left">Pending</th>
                                <th class="px-6 py-3 text-left">Actions</th>
                            </tr>
                        </thead>

                        <tbody id="admissionsTable">
                            <tr>
                                <td colspan="6" class="text-center py-6 text-gray-400">Loading...</td>
                            </tr>
                        </tbody>

                    </table>

                </div>

            </main>
            ```

        </div>

    </div>

    <!-- Toast -->

    <div id="toast" class="fixed top-4 right-4 hidden bg-white shadow-lg rounded-lg px-4 py-2"></div>

    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/admission.js"></script>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
