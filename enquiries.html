<!-- Header -->
<header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
  <h1 class="text-xl font-semibold">Enquiries</h1>

  <div class="flex gap-3">

    <button id="createEnquiryBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-700">
      <i data-lucide="plus"></i>
      New
    </button>

    <button id="logoutBtn" class="text-gray-600 hover:text-red-500">
      <i data-lucide="log-out"></i>
    </button>

  </div>
</header>

<!-- Content -->
<main class="p-6 space-y-6 overflow-y-auto">

  <!-- Filters -->
  <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap gap-4">

    <input id="searchInput" placeholder="Search..." 
      class="px-4 py-2 border rounded-lg w-60"/>

    <select id="statusFilter" class="px-4 py-2 border rounded-lg">
      <option value="">All</option>
      <option value="FOLLOW_UP">Follow Up</option>
      <option value="INTERESTED">Interested</option>
    </select>

    <select id="followUpFilter" class="px-4 py-2 border rounded-lg">
      <option value="today">Today</option>
      <option value="overdue">Overdue</option>
      <option value="all">All</option>
    </select>

  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden">

    <table class="w-full">

      <thead class="bg-gray-50 text-gray-500 text-sm">
        <tr>
          <th class="px-6 py-3 text-left">Name</th>
          <th class="px-6 py-3 text-left">Course</th>
          <th class="px-6 py-3 text-left">Status</th>
          <th class="px-6 py-3 text-left">Follow-up</th>
          <th class="px-6 py-3 text-left">Actions</th>
        </tr>
      </thead>

      <tbody id="enquiryTableBody" class="divide-y">

        <tr>
          <td colspan="5" class="text-center py-6 text-gray-400">
            Loading...
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</main>
