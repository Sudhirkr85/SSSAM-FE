<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login • CRM</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Axios -->

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Lucide Icons -->

  <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-6">

<!-- Card -->
<div class="bg-white/90 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/20">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
      <i data-lucide="building-2" class="w-7 h-7 text-white"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">Institute CRM</h1>
    <p class="text-sm text-gray-500 mt-1">Enquiry Management System</p>
  </div>

  <!-- Form -->
  <form id="loginForm" class="space-y-5">

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <div class="relative">
        <i data-lucide="mail" class="absolute left-3 top-3.5 w-4 h-4 text-gray-400"></i>
        <input
          type="email"
          id="email"
          required
          class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter your email"
        />
      </div>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="relative">
        <i data-lucide="lock" class="absolute left-3 top-3.5 w-4 h-4 text-gray-400"></i>
        <input
          type="password"
          id="password"
          required
          class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Enter your password"
        />
        <button type="button" onclick="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600">
          <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Options -->
    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2 text-gray-600">
        <input type="checkbox" class="w-4 h-4 text-blue-600 rounded">
        Remember me
      </label>
      <a href="#" class="text-blue-600 hover:underline">Forgot?</a>
    </div>

    <!-- Button -->
    <button
      type="submit"
      id="loginBtn"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center gap-2 shadow-md"
    >
      <span id="btnText">Sign In</span>
      <i data-lucide="loader-2" id="btnSpinner" class="hidden w-4 h-4 animate-spin"></i>
    </button>

  </form>
</div>

  </div>

  <!-- Toast -->

  <div id="toast" class="fixed top-4 right-4 translate-x-full transition-transform duration-300 z-50">
    <div class="bg-white shadow-xl rounded-lg px-4 py-3 flex items-center gap-3 border">
      <i data-lucide="info" id="toastIcon" class="w-5 h-5 text-blue-500"></i>
      <div>
        <p id="toastTitle" class="text-sm font-semibold"></p>
        <p id="toastMessage" class="text-xs text-gray-500"></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->

  <script src="js/api.js"></script>

  <script src="js/ui.js"></script>

  <script src="js/auth.js"></script>

  <script>
    lucide.createIcons();

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');

      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }

      lucide.createIcons();
    }
  </script>

</body>
</html>
