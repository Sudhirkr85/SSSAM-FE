<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • SSSAM</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Axios -->

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Lucide -->

  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

</head>

<body
  class="bg-gradient-to-br from-indigo-900 via-blue-900 to-purple-900 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-6">

    
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl p-8">

      <!-- LOGO -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg">
          <i data-lucide="building-2" class="text-white"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Institute SSSAM</h1>
        <p class="text-gray-300 text-sm">Sign in to continue</p>
      </div>

      <!-- FORM -->
      <form id="loginForm" class="space-y-5">

        <!-- EMAIL -->
        <div>
          <label class="text-sm text-gray-300">Email</label>
          <div class="relative mt-1">
            <i data-lucide="mail" class="absolute left-3 top-3 text-gray-400"></i>
            <input type="email" id="email"
              class="w-full pl-10 pr-3 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
              placeholder="Enter email">
          </div>
          <p id="emailError" class="hidden text-red-400 text-sm mt-1 flex items-center gap-1">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            <span>Invalid email or password</span>
          </p>
        </div>

        <!-- PASSWORD -->
        <div>
          <label class="text-sm text-gray-300">Password</label>
          <div class="relative mt-1">
            <i data-lucide="lock" class="absolute left-3 top-3 text-gray-400"></i>
            <input type="password" id="password"
              class="w-full pl-10 pr-10 py-3 rounded-lg bg-white/20 text-white placeholder-gray-300 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
              placeholder="Enter password">
            <button type="button" id="togglePassword" class="absolute right-3 top-3 text-gray-400">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <!-- BUTTON -->
        <button id="loginBtn" type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition flex items-center justify-center gap-2">
          <span>Sign In</span>
          <i data-lucide="arrow-right"></i>
        </button>

      </form>

    </div>
    

  </div>

  <!-- TOAST -->

  <div id="toast" class="fixed top-4 right-4 hidden"></div>

  <!-- JS -->

  <script src="js/api.js"></script>

  <script src="js/ui.js"></script>

  <script src="js/auth.js"></script>

  <script>
    lucide.createIcons();

    document.getElementById('togglePassword').addEventListener('click', () => {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    });

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBWB0wBK0azqsjPrr6FT1sG3BYroM8jeZ4",
      authDomain: "sudhir-b1f77.firebaseapp.com",
      projectId: "sudhir-b1f77",
      storageBucket: "sudhir-b1f77.firebasestorage.app",
      messagingSenderId: "894623128679",
      appId: "1:894623128679:web:585124cd50224f00ea08c2"
    };

    const VAPID_KEY = "BFs0D0iJaKgkIZwLCCT7MIqfTXsD-PaKuM1pHEaVTPbpATnDQyQfO0sB85x9wgoIVBQMuT42ChfIFgysuNxtqGo";

    // Initialize Firebase on login page
    if (typeof firebase !== 'undefined') {
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
        }
        const messaging = firebase.messaging();

        // Request permission and get FCM token
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            messaging.getToken({ vapidKey: VAPID_KEY }).then(token => {
              if (token) {
                localStorage.setItem('fcmToken', token);
                console.log('FCM Token saved for login');
              }
            }).catch(err => {
              console.log('FCM token error:', err);
            });
          }
        });
      } catch (error) {
        console.log('Firebase init error:', error);
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeMobileMenu();
      }
    });
  </script>

</body>

</html>
