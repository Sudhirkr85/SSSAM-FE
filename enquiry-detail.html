<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enquiry Details • CRM</title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>
–
    <!-- Axios -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Lucide Icons -->

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->

        <aside class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <i data-lucide="building-2" class="text-blue-400"></i>
                <span class="font-semibold text-lg">CRM</span>
            </div>

            ```
            <nav class="flex-1 py-4 space-y-1">
                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="enquiries.html" class="flex items-center gap-3 px-6 py-3 bg-blue-600">
                    <i data-lucide="message-square"></i> Enquiries
                </a>
                <a href="admissions.html" class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800">
                    <i data-lucide="graduation-cap"></i> Admissions
                </a>
            </nav>

            <div class="p-4 border-t border-gray-800 text-sm">
                <div id="userName"></div>
                <div id="userRole" class="text-gray-400 text-xs"></div>
            </div>
            ```

        </aside>

        <!-- Main -->

        <div class="flex-1 flex flex-col">

            ```
            <!-- Header -->
            <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-3">
                    <a href="enquiries.html">
                        <i data-lucide="arrow-left"></i>
                    </a>
                    <h1 class="text-xl font-semibold">Enquiry Details</h1>
                </div>

                <button id="logoutBtn">
                    <i data-lucide="log-out"></i>
                </button>
            </header>

            <!-- Content -->
            <main class="p-6 space-y-6 overflow-y-auto">

                <!-- Top Card -->
                <div class="bg-white p-6 rounded-xl shadow-sm flex justify-between items-center">

                    <div>
                        <h2 id="detailName" class="text-2xl font-bold"></h2>
                        <p id="detailMobile" class="text-gray-500"></p>
                        <p id="detailCourse" class="text-sm text-gray-500"></p>
                    </div>

                    <div id="detailStatusBadge"></div>

                </div>

                <!-- ACTION BUTTONS -->
                <div class="flex gap-3 flex-wrap">

                    <button onclick="openStatusModal(currentId,'CONTACTED')" class="action-btn" title="Contacted">
                        <i data-lucide="phone"></i>
                    </button>

                    <button onclick="openStatusModal(currentId,'FOLLOW_UP')" class="action-btn" title="Follow Up">
                        <i data-lucide="calendar"></i>
                    </button>

                    <button onclick="openStatusModal(currentId,'INTERESTED')" class="action-btn" title="Interested">
                        <i data-lucide="thumbs-up"></i>
                    </button>

                    <button onclick="openStatusModal(currentId,'NOT_INTERESTED')" class="action-btn"
                        title="Not Interested">
                        <i data-lucide="x-circle"></i>
                    </button>

                    <button onclick="openConvertModal(currentId)" class="action-btn" title="Convert">
                        <i data-lucide="graduation-cap"></i>
                    </button>

                </div>

                <!-- DETAILS -->
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h3 class="font-semibold mb-4">Details</h3>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><b>Email:</b> <span id="infoEmail"></span></div>
                        <div><b>Assigned:</b> <span id="infoAssigned"></span></div>
                        <div><b>Status:</b> <span id="infoStatus"></span></div>
                        <div><b>Created:</b> <span id="infoCreated"></span></div>
                    </div>
                </div>

                <!-- TIMELINE -->
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h3 class="font-semibold mb-4">Activity Timeline</h3>
                    <div id="timelineList" class="space-y-3 text-sm text-gray-600">
                        Loading...
                    </div>
                </div>

            </main>
            ```

        </div>

    </div>

    <!-- STATUS MODAL -->

    <div id="statusModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
        <form id="statusForm" class="bg-white rounded-xl p-6 w-full max-w-md space-y-4">

            ```
            <input type="hidden" id="statusEnquiryId">
            <input type="hidden" id="statusTargetStatus">

            <h2 class="text-lg font-semibold">Update Status</h2>

            <textarea id="statusNote" required placeholder="Add note..."
                class="w-full border px-4 py-2 rounded-lg"></textarea>

            <input type="date" id="statusFollowUpDate" class="w-full border px-4 py-2 rounded-lg">

            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeStatusModal()" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Save</button>
            </div>
            ```

        </form>
    </div>

    <!-- CONVERT MODAL -->

    <div id="convertModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
        <form id="convertForm" class="bg-white rounded-xl p-6 w-full max-w-md space-y-4">

            ```
            <input type="hidden" id="convertEnquiryId">

            <h2 class="text-lg font-semibold">Convert</h2>

            <input id="convertCourse" placeholder="Course" class="w-full border px-4 py-2 rounded-lg">
            <input id="convertFees" placeholder="Fees" type="number" class="w-full border px-4 py-2 rounded-lg">

            <div class="flex justify-end gap-3">
                <button type="button" onclick="closeConvertModal()" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-lg">Convert</button>
            </div>
            ```

        </form>
    </div>

    <!-- Toast -->

    <div id="toast" class="fixed top-4 right-4 hidden bg-white shadow-lg rounded-lg px-4 py-2"></div>

    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/enquiry.js"></script>

    <script>
        lucide.createIcons();
    </script>

    <style>
        .action-btn {
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #e5e7eb;
            transform: scale(1.1);
        }
    </style>

</body>

</html>
