<!-- Active Menu Script -->
<script>
  // Highlight active menu item
  document.addEventListener('DOMContentLoaded', () => {
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
    document.querySelectorAll('.nav-item').forEach(link => {
      if (link.dataset.page === currentPage) {
        link.classList.add('bg-[#3b82f6]', 'text-white');
        link.classList.remove('hover:bg-gray-800');
      }
    });
  });

  // Show/hide navigation based on user role
  function setNavigation(role) {
    const counselorNav = document.getElementById('counselorNav');
    const adminNav = document.getElementById('adminNav');
    
    if (role === 'admin') {
      counselorNav?.classList.add('hidden');
      adminNav?.classList.remove('hidden');
    } else {
      counselorNav?.classList.remove('hidden');
      adminNav?.classList.add('hidden');
    }
  }

  // Update follow-up badge count
  function updateFollowupBadge(count) {
    const badge = document.getElementById('followupBadge');
    if (badge) {
      badge.textContent = count;
      badge.classList.toggle('hidden', count === 0);
    }
  }
</script>
