<!-- ======================
     TOAST
====================== -->

<div id="toast" class="fixed top-4 right-4 hidden z-50"></div>

<!-- ======================
     CONFIRM MODAL
====================== -->

<div id="confirmModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 space-y-4 animate-[fadeIn_.2s]">

        
        <div class="flex items-center gap-3">
            <i data-lucide="alert-triangle" class="text-red-500"></i>
            <h3 id="confirmTitle" class="text-lg font-semibold">Confirm Action</h3>
        </div>

        <p id="confirmMessage" class="text-gray-600 text-sm"></p>

        <div class="flex justify-end gap-3 pt-4">
            <button id="confirmCancel" class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100">
                Cancel
            </button>

            <button id="confirmOk"
                class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 flex items-center gap-2">
                <i data-lucide="check"></i>
                Confirm
            </button>
        </div>
        

    </div>
</div>

<!-- ======================
     GLOBAL MODAL (DYNAMIC)
====================== -->

<div id="globalModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4">

        
        <div class="flex justify-between items-center">
            <h2 id="modalTitle" class="text-lg font-semibold"></h2>
            <button onclick="closeGlobalModal()">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div id="modalBody" class="text-sm text-gray-600"></div>
        

    </div>
</div>

<!-- ======================
     LOADING OVERLAY
====================== -->

<div id="loadingOverlay"
    class="fixed inset-0 bg-black/30 backdrop-blur-sm hidden flex items-center justify-center z-50">

    <div class="bg-white rounded-xl px-6 py-4 shadow-lg flex items-center gap-3">

        
        <i data-lucide="loader-2" class="animate-spin text-blue-600"></i>

        <span class="text-gray-700 font-medium">Loading...</span>
        

    </div>
</div>

<!-- ======================
     SCRIPT HELPERS
====================== -->

<script>
    function showConfirm(title, message, onConfirm) {
        const modal = document.getElementById('confirmModal');

        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;

        modal.classList.remove('hidden');

        const okBtn = document.getElementById('confirmOk');
        const cancelBtn = document.getElementById('confirmCancel');

        const close = () => modal.classList.add('hidden');

        cancelBtn.onclick = close;

        okBtn.onclick = () => {
            close();
            onConfirm && onConfirm();
        };
    }

    function showModal(title, html) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('globalModal').classList.remove('hidden');
    }

    function closeGlobalModal() {
        document.getElementById('globalModal').classList.add('hidden');
    }

    function showLoading() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }
</script>
