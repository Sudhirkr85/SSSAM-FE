<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • SSSAM CRM</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    
    /* Stat card hover */
    .stat-card { transition: all 0.2s ease; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <div class="flex h-screen overflow-hidden">
    
    <!-- Mobile Menu Toggle -->
    <button id="mobileMenuToggle" class="lg:hidden fixed top-4 left-4 z-50 w-10 h-10 bg-gray-900 text-white rounded-xl flex items-center justify-center shadow-lg">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>

    <!-- Mobile Overlay -->
    <div id="mobileOverlay" class="lg:hidden fixed inset-0 bg-black/50 z-40 hidden transition-opacity opacity-0"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-64 bg-gray-900 text-gray-300 flex flex-col fixed lg:relative inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-50">
      <div class="px-6 py-5 border-b border-gray-800 flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
          <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
        </div>
        <div>
          <span class="text-lg font-semibold text-white">SSSAM</span>
          <p class="text-xs text-gray-500">CRM System</p>
        </div>
      </div>

      <nav class="flex-1 py-4 space-y-1">
        <a href="today.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800 transition-colors">
          <i data-lucide="phone-call" class="w-5 h-5"></i>
          <span>Today Calls</span>
        </a>
        <a href="dashboard.html" class="bg-blue-600 text-white flex items-center gap-3 px-6 py-3 mx-3 rounded-lg">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          <span>Dashboard</span>
        </a>
        <a href="enquiries.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800 transition-colors">
          <i data-lucide="message-square" class="w-5 h-5"></i>
          <span>Enquiries</span>
        </a>
        <a href="admissions.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800 transition-colors">
          <i data-lucide="user-check" class="w-5 h-5"></i>
          <span>Admissions</span>
        </a>
        <a href="payments.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800 transition-colors">
          <i data-lucide="wallet" class="w-5 h-5"></i>
          <span>Payments</span>
        </a>
        <a href="reports.html" id="reportsMenu" class="hidden flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800 transition-colors">
          <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
          <span>Reports</span>
        </a>
      </nav>

      <div class="p-4 border-t border-gray-800">
        <p id="userName" class="text-sm text-white font-medium"></p>
        <p id="userRole" class="text-xs text-gray-400"></p>
      </div>

      <button id="mobileCloseBtn" class="lg:hidden absolute top-4 right-4 w-8 h-8 bg-gray-800 text-gray-400 hover:text-white rounded-lg flex items-center justify-center">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col lg:ml-0 overflow-hidden">
      
      <!-- HEADER -->
      <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm lg:pl-6 pl-16">
        <div class="flex items-center gap-3">
          <button id="sidebarToggle" onclick="toggleSidebar()" class="hidden lg:flex w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-xl items-center justify-center transition-colors" title="Hide Sidebar">
            <i data-lucide="panel-left" class="w-5 h-5 text-gray-600"></i>
          </button>
          <h1 class="text-xl font-semibold text-gray-800">Dashboard</h1>
        </div>
        <button id="logoutBtn" class="flex items-center gap-2 text-gray-600 hover:text-red-600 transition-colors font-medium text-sm">
          <i data-lucide="log-out" class="w-5 h-5"></i>
          <span>Logout</span>
        </button>
      </header>

      <!-- CONTENT -->
      <div class="flex-1 overflow-y-auto p-6">
        
        <!-- SIMPLE SUMMARY CARDS -->
        <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
          
          <!-- Total Leads -->
          <a href="enquiries.html" class="stat-card bg-white rounded-xl shadow-sm p-5 block">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                <i data-lucide="message-square" class="w-6 h-6 text-blue-600"></i>
              </div>
              <span class="text-sm text-gray-500">Total Leads</span>
            </div>
            <p id="totalLeads" class="text-3xl font-bold text-gray-800">0</p>
          </a>

          <!-- Admissions -->
          <a href="admissions.html" class="stat-card bg-white rounded-xl shadow-sm p-5 block">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                <i data-lucide="user-check" class="w-6 h-6 text-purple-600"></i>
              </div>
              <span class="text-sm text-gray-500">Admissions</span>
            </div>
            <p id="totalAdmissions" class="text-3xl font-bold text-purple-600">0</p>
          </a>

          <!-- Revenue -->
          <a href="payments.html" class="stat-card bg-white rounded-xl shadow-sm p-5 block">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                <i data-lucide="wallet" class="w-6 h-6 text-green-600"></i>
              </div>
              <span class="text-sm text-gray-500">Revenue</span>
            </div>
            <p id="totalRevenue" class="text-3xl font-bold text-green-600">₹0</p>
          </a>

        </div>

        <!-- QUICK ACTIONS -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <a href="enquiries.html" class="flex items-center gap-3 p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition-all">
            <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
              <i data-lucide="message-square" class="w-5 h-5 text-blue-600"></i>
            </div>
            <div>
              <p class="font-medium text-gray-800">All Enquiries</p>
              <p class="text-xs text-gray-500">Manage leads</p>
            </div>
          </a>
          <a href="admissions.html" class="flex items-center gap-3 p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition-all">
            <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
              <i data-lucide="graduation-cap" class="w-5 h-5 text-purple-600"></i>
            </div>
            <div>
              <p class="font-medium text-gray-800">Admissions</p>
              <p class="text-xs text-gray-500">Students</p>
            </div>
          </a>
          <a href="reports.html" class="flex items-center gap-3 p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition-all">
            <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
              <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-600"></i>
            </div>
            <div>
              <p class="font-medium text-gray-800">Reports</p>
              <p class="text-xs text-gray-500">View analytics</p>
            </div>
          </a>
        </div>

      </div>
    </main>
  </div>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Mobile Menu
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const mobileCloseBtn = document.getElementById('mobileCloseBtn');
    const sidebar = document.getElementById('sidebar');
    const mobileOverlay = document.getElementById('mobileOverlay');

    function openMobileMenu() {
      sidebar.classList.remove('-translate-x-full');
      mobileOverlay.classList.remove('hidden');
      setTimeout(() => mobileOverlay.classList.remove('opacity-0'), 10);
      document.body.style.overflow = 'hidden';
    }

    function closeMobileMenu() {
      sidebar.classList.add('-translate-x-full');
      mobileOverlay.classList.add('opacity-0');
      setTimeout(() => mobileOverlay.classList.add('hidden'), 300);
      document.body.style.overflow = '';
    }

    mobileMenuToggle?.addEventListener('click', openMobileMenu);
    mobileCloseBtn?.addEventListener('click', closeMobileMenu);
    mobileOverlay?.addEventListener('click', closeMobileMenu);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMobileMenu();
    });

    // Update user info
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const userNameEl = document.getElementById('userName');
    const userRoleEl = document.getElementById('userRole');
    if (userNameEl) userNameEl.textContent = user.name || 'User';
    if (userRoleEl) userRoleEl.textContent = user.role === 'admin' ? 'Administrator' : 'Counselor';

    // Show reports menu for admin
    if (user.role === 'admin') {
      document.getElementById('reportsMenu')?.classList.remove('hidden');
    }

    // Logout
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
      localStorage.clear();
      window.location.href = 'index.html';
    });

    // Load Dashboard Stats
    async function loadDashboardStats() {
      try {
        // Load dashboard data from API
        const res = await apiGet(API_ENDPOINTS.DASHBOARD.GET);

        // Handle API response structure: { success, message, data }
        const response = res.data || res;

        if (response) {
          // Update Total Leads
          document.getElementById('totalLeads').textContent = response.totalEnquiries || 0;

          // Update Total Admissions
          const admissionsData = response.admissions || {};
          document.getElementById('totalAdmissions').textContent = admissionsData.totalAdmissions || response.totalConversions || 0;

          // Update Revenue - use yearlyRevenue as main total
          const revenueData = response.revenue || {};
          const totalRevenue = revenueData.yearlyRevenue || 0;
          document.getElementById('totalRevenue').textContent = formatCurrency(totalRevenue);
        }
      } catch (err) {
        console.error('Failed to load dashboard stats:', err);
        // Use mock data for demo
        document.getElementById('totalLeads').textContent = '42';
        document.getElementById('totalAdmissions').textContent = '9';
        document.getElementById('totalRevenue').textContent = '₹13,448';
      }
    }

    function formatCurrency(amount) {
      if (!amount || amount === 0) return '₹0';
      if (typeof amount === 'string') return amount;
      return '₹' + amount.toLocaleString('en-IN');
    }

    // Load stats on page load
    loadDashboardStats();
  </script>

  <script src="js/sidebar.js"></script>

</body>
</html>
