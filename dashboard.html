<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard • CRM</title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Axios -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Lucide Icons -->

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->

        <aside class="w-64 bg-gray-900 text-white flex flex-col">

            ```
            <div class="p-6 border-b border-gray-800 flex items-center gap-3">
                <i data-lucide="building-2" class="w-6 h-6 text-blue-400"></i>
                <span class="text-lg font-semibold">CRM</span>
            </div>

            <nav class="flex-1 py-4 space-y-1">

                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 bg-blue-600">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </a>

                <a href="enquiries.html"
                    class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white">
                    <i data-lucide="message-square"></i>
                    Enquiries
                </a>

                <a href="admissions.html"
                    class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white">
                    <i data-lucide="graduation-cap"></i>
                    Admissions
                </a>

                <a href="payments.html"
                    class="flex items-center gap-3 px-6 py-3 text-gray-400 hover:bg-gray-800 hover:text-white">
                    <i data-lucide="wallet"></i>
                    Payments
                </a>

            </nav>

            <div class="p-4 border-t border-gray-800 text-sm">
                <div id="userName"></div>
                <div id="userRole" class="text-gray-400 text-xs"></div>
            </div>
            ```

        </aside>

        <!-- Main -->

        <div class="flex-1 flex flex-col">

            ```
            <!-- Header -->
            <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
                <h1 class="text-xl font-semibold">Dashboard</h1>

                <button id="logoutBtn" class="text-gray-600 hover:text-red-500">
                    <i data-lucide="log-out"></i>
                </button>
            </header>

            <!-- Content -->
            <main class="p-6 space-y-6 overflow-y-auto">

                <!-- Stats -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-500">Total Enquiries</p>
                            <p id="totalEnquiries" class="text-2xl font-bold">0</p>
                        </div>
                        <i data-lucide="message-square" class="text-blue-500"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-500">Today Enquiries</p>
                            <p id="newEnquiries" class="text-2xl font-bold text-green-600">0</p>
                        </div>
                        <i data-lucide="plus-circle" class="text-green-500"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-500">Overdue Follow-up</p>
                            <p id="overdueEnquiries" class="text-2xl font-bold text-red-600">0</p>
                        </div>
                        <i data-lucide="clock" class="text-red-500"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-500">Converted</p>
                            <p id="convertedEnquiries" class="text-2xl font-bold text-purple-600">0</p>
                        </div>
                        <i data-lucide="check-circle" class="text-purple-500"></i>
                    </div>

                </div>

                <!-- Recent -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">

                    <div class="px-6 py-4 border-b flex justify-between">
                        <h2 class="font-semibold">Recent Enquiries</h2>
                        <a href="enquiries.html" class="text-blue-600 text-sm">View All</a>
                    </div>

                    <table class="w-full">

                        <thead class="bg-gray-50 text-sm text-gray-500">
                            <tr>
                                <th class="px-6 py-3 text-left">Name</th>
                                <th class="px-6 py-3 text-left">Course</th>
                                <th class="px-6 py-3 text-left">Status</th>
                                <th class="px-6 py-3 text-left">Follow-up</th>
                                <th class="px-6 py-3 text-left">Assigned</th>
                            </tr>
                        </thead>

                        <tbody id="recentEnquiriesTable" class="divide-y">
                            <tr>
                                <td colspan="5" class="text-center py-6 text-gray-400">Loading...</td>
                            </tr>
                        </tbody>

                    </table>

                </div>

            </main>
            ```

        </div>

    </div>

    <!-- Toast -->

    <div id="toast" class="fixed top-4 right-4 hidden bg-white shadow-lg rounded-lg px-4 py-2"></div>

    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/dashboard.js"></script>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
