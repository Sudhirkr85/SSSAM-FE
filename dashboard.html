<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard • CRM</title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Axios -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Lucide -->

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- SIDEBAR -->

        <aside class="w-64 bg-gray-900 text-gray-300 flex flex-col">

            ```
            <div class="px-6 py-5 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="building-2" class="text-white"></i>
                </div>
                <span class="text-lg font-semibold text-white">CRM</span>
            </div>

            <nav class="flex-1 py-4 space-y-1">

                <a href="today.html"
                    class="nav-item flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="phone"></i> Today Calls
                </a>

                <a href="dashboard.html"
                    class="nav-item bg-blue-600 text-white flex items-center gap-3 px-6 py-3 mx-3 rounded-lg">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>

                <a href="enquiries.html"
                    class="nav-item flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="message-square"></i> Enquiries
                </a>

                <a href="admissions.html"
                    class="nav-item flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="graduation-cap"></i> Admissions
                </a>

                <a href="payments.html"
                    class="nav-item flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="wallet"></i> Payments
                </a>

                <a href="reports.html" id="reportsMenu"
                    class="hidden nav-item flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="bar-chart-3"></i> Reports
                </a>

            </nav>

            <div class="p-4 border-t border-gray-800">
                <p id="userName" class="text-sm text-white"></p>
                <p id="userRole" class="text-xs text-gray-400"></p>
            </div>
            ```

        </aside>

        <!-- MAIN -->

        <div class="flex-1 flex flex-col">

            ```
            <!-- NAVBAR -->
            <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm">
                <h1 class="text-lg font-semibold">Dashboard</h1>
                <button id="logoutBtn" class="flex items-center gap-2 text-gray-600 hover:text-red-600">
                    <i data-lucide="log-out"></i>
                    Logout
                </button>
            </header>

            <!-- CONTENT -->
            <main class="p-6 space-y-6 overflow-y-auto">

                <!-- STATS -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">

                    <div class="bg-white p-5 rounded-xl shadow flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Total Enquiries</p>
                            <p id="totalEnquiries" class="text-2xl font-bold">0</p>
                        </div>
                        <i data-lucide="users"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Today Enquiries</p>
                            <p id="newEnquiries" class="text-2xl font-bold">0</p>
                        </div>
                        <i data-lucide="user-plus"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Overdue</p>
                            <p id="overdueEnquiries" class="text-2xl font-bold text-red-600">0</p>
                        </div>
                        <i data-lucide="alert-circle"></i>
                    </div>

                    <div class="bg-white p-5 rounded-xl shadow flex justify-between">
                        <div>
                            <p class="text-sm text-gray-500">Converted</p>
                            <p id="convertedEnquiries" class="text-2xl font-bold text-green-600">0</p>
                        </div>
                        <i data-lucide="check-circle"></i>
                    </div>

                </div>

                <!-- TODAY CALLS QUICK VIEW -->
                <div class="bg-white p-5 rounded-xl shadow">

                    <div class="flex justify-between mb-4">
                        <h2 class="font-semibold">Today Calls</h2>
                        <a href="today.html" class="text-blue-600 text-sm">View All</a>
                    </div>

                    <table class="w-full text-sm">
                        <thead class="text-gray-500">
                            <tr>
                                <th class="text-left py-2">Name</th>
                                <th>Course</th>
                                <th>Status</th>
                                <th>Follow-Up</th>
                            </tr>
                        </thead>
                        <tbody id="todayTable">
                            <tr>
                                <td colspan="4" class="text-center py-4 text-gray-400">Loading...</td>
                            </tr>
                        </tbody>
                    </table>

                </div>

                <!-- RECENT -->
                <div class="bg-white p-5 rounded-xl shadow">

                    <h2 class="font-semibold mb-4">Recent Enquiries</h2>

                    <table class="w-full text-sm">
                        <thead class="text-gray-500">
                            <tr>
                                <th class="text-left py-2">Name</th>
                                <th>Course</th>
                                <th>Status</th>
                                <th>Follow-Up</th>
                            </tr>
                        </thead>
                        <tbody id="recentEnquiriesTable">
                            <tr>
                                <td colspan="4" class="text-center py-4 text-gray-400">Loading...</td>
                            </tr>
                        </tbody>
                    </table>

                </div>

            </main>
            ```

        </div>

    </div>

    <!-- TOAST -->

    <div id="toast" class="fixed top-4 right-4 hidden"></div>

    <!-- JS -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/dashboard.js"></script>

    <script>
        lucide.createIcons();
    </script>

</body>

</html>
