<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payments • SSSAM</title>

    <!-- Tailwind -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Axios -->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Lucide -->

    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Mobile Menu Toggle Button (visible only on small screens) -->
        <button id="mobileMenuToggle" class="lg:hidden fixed top-4 left-4 z-50 w-10 h-10 bg-gray-900 text-white rounded-xl flex items-center justify-center shadow-lg">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <!-- Mobile Overlay Backdrop -->
        <div id="mobileOverlay" class="lg:hidden fixed inset-0 bg-black/50 z-40 hidden transition-opacity opacity-0"></div>

        <!-- SIDEBAR -->

        <aside id="sidebar" class="w-64 bg-gray-900 text-gray-300 flex flex-col fixed lg:relative inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-50">

            <div class="px-6 py-5 border-b border-gray-800 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="building-2" class="text-white"></i>
                </div>
                <span class="text-lg font-semibold text-white">SSSAM</span>
            </div>

            <nav class="flex-1 py-4 space-y-1">
                <a href="today.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="phone"></i> Today Calls
                </a>
                <a href="dashboard.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="enquiries.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="message-square"></i> Enquiries
                </a>
                <a href="admissions.html" class="flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="graduation-cap"></i> Admissions
                </a>
                <a href="payments.html"
                    class="bg-blue-600 text-white flex items-center gap-3 px-6 py-3 mx-3 rounded-lg">
                    <i data-lucide="wallet"></i> Payments
                </a>
                <a href="reports.html" id="reportsMenu"
                    class="hidden flex items-center gap-3 px-6 py-3 mx-3 rounded-lg hover:bg-gray-800">
                    <i data-lucide="bar-chart-3"></i> Reports
                </a>
            </nav>

            <div class="p-4 border-t border-gray-800">
                <p id="userName" class="text-sm text-white"></p>
                <p id="userRole" class="text-xs text-gray-400"></p>
            </div>

            <!-- Mobile Close Button (visible only on small screens) -->
            <button id="mobileCloseBtn" class="lg:hidden absolute top-4 right-4 w-8 h-8 bg-gray-800 text-gray-400 hover:text-white rounded-lg flex items-center justify-center">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

        </aside>

        <!-- MAIN -->

        <div class="flex-1 flex flex-col">

            <!-- NAVBAR -->
            <header class="bg-white px-6 py-4 flex justify-between items-center shadow-sm lg:pl-6 pl-16">
                <h1 class="text-lg font-semibold text-gray-800">Payments</h1>
                <button id="logoutBtn" class="flex items-center gap-2 text-gray-600 hover:text-red-600 transition-colors font-medium">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span>Logout</span>
                </button>
            </header>

            <!-- CONTENT -->
            <main class="p-6 space-y-6 overflow-y-auto">

                <!-- STATS -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

                    <div class="bg-white p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                                <i data-lucide="wallet" class="w-5 h-5 text-blue-600"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Total Payments</p>
                                <p id="totalPayments" class="text-xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                        <p id="totalAmount" class="text-sm text-green-600 mt-2 font-medium">₹0</p>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                                <i data-lucide="banknote" class="w-5 h-5 text-green-600"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Cash</p>
                                <p id="cashCount" class="text-xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                        <p id="cashAmount" class="text-sm text-green-600 mt-2 font-medium">₹0</p>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                                <i data-lucide="smartphone" class="w-5 h-5 text-purple-600"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">UPI</p>
                                <p id="upiCount" class="text-xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                        <p id="upiAmount" class="text-sm text-green-600 mt-2 font-medium">₹0</p>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                                <i data-lucide="credit-card" class="w-5 h-5 text-amber-600"></i>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500">Card</p>
                                <p id="cardCount" class="text-xl font-bold text-gray-800">0</p>
                            </div>
                        </div>
                        <p id="cardAmount" class="text-sm text-green-600 mt-2 font-medium">₹0</p>
                    </div>

                </div>

                <!-- TABLE -->
                <div class="bg-white rounded-xl shadow overflow-hidden">

                    <table class="w-full text-sm">

                        <thead class="bg-gray-50 text-gray-600 font-medium">
                            <tr>
                                <th class="px-6 py-3 text-left">Student</th>
                                <th class="px-6 py-3">Course</th>
                                <th class="px-6 py-3">Amount</th>
                                <th class="px-6 py-3">Mode</th>
                                <th class="px-6 py-3">Date</th>
                            </tr>
                        </thead>

                        <tbody id="paymentTable">
                            <tr>
                                <td colspan="5" class="text-center py-12">
                                    <div class="flex flex-col items-center gap-3">
                                        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                                            <i data-lucide="loader-2" class="w-6 h-6 text-gray-400 animate-spin"></i>
                                        </div>
                                        <p class="text-gray-500">Loading payments...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>

                    </table>

                    <!-- PAGINATION -->
                    <div class="border-t border-gray-100 px-6 py-4 flex items-center justify-between">

                        <div class="text-sm text-gray-500">
                            Showing <span id="showingFrom" class="font-medium text-gray-800">0</span> to <span id="showingTo" class="font-medium text-gray-800">0</span> of <span id="totalItems" class="font-medium text-gray-800">0</span> payments
                        </div>

                        <div class="flex items-center gap-2">
                            <button id="firstPage" onclick="goToPage(1)" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevrons-left" class="w-4 h-4"></i>
                            </button>
                            <button id="prevPage" onclick="changePage(-1)" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>

                            <div id="pageNumbers" class="flex items-center gap-1">
                                <span class="px-3 py-2 text-sm bg-blue-600 text-white rounded-lg font-medium">1</span>
                            </div>

                            <button id="nextPage" onclick="changePage(1)" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                            <button id="lastPage" onclick="goToLastPage()" class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i data-lucide="chevrons-right" class="w-4 h-4"></i>
                            </button>
                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <!-- TOAST -->

    <div id="toast" class="fixed top-4 right-4 hidden"></div>

    <!-- JS -->

    <script src="js/api.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/payment.js"></script>

    <script>
        lucide.createIcons();

        // Mobile Menu Toggle
        const mobileMenuToggle = document.getElementById('mobileMenuToggle');
        const mobileCloseBtn = document.getElementById('mobileCloseBtn');
        const sidebar = document.getElementById('sidebar');
        const mobileOverlay = document.getElementById('mobileOverlay');

        function openMobileMenu() {
            sidebar.classList.remove('-translate-x-full');
            mobileOverlay.classList.remove('hidden');
            setTimeout(() => mobileOverlay.classList.remove('opacity-0'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            sidebar.classList.add('-translate-x-full');
            mobileOverlay.classList.add('opacity-0');
            setTimeout(() => mobileOverlay.classList.add('hidden'), 300);
            document.body.style.overflow = '';
        }

        mobileMenuToggle?.addEventListener('click', openMobileMenu);
        mobileCloseBtn?.addEventListener('click', closeMobileMenu);
        mobileOverlay?.addEventListener('click', closeMobileMenu);

        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMobileMenu();
        });
    </script>

</body>

</html>
